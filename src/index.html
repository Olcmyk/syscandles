<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS System Monitor</title>
    <link rel="stylesheet" href="styles.css">
    <!-- 从CDN加载LightweightCharts - 使用v4版本 -->
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        // 添加全局错误处理
        window.addEventListener('error', (e) => {
            console.error('Global error:', e.error);
        });
        window.addEventListener('unhandledrejection', (e) => {
            console.error('Unhandled promise rejection:', e.reason);
        });
        // 检查LightweightCharts是否加载
        window.addEventListener('load', () => {
            console.log('Window loaded, LightweightCharts:', window.LightweightCharts);
        });
    </script>
</head>
<body>
    <div id="app">
        <div id="toolbar">
            <div id="period-buttons">
                <button class="period-btn" data-period="5s">5秒</button>
                <button class="period-btn active" data-period="1min">1分</button>
                <button class="period-btn" data-period="5min">5分</button>
                <button class="period-btn" data-period="15min">15分</button>
                <button class="period-btn" data-period="1h">1时</button>
            </div>
            <div id="zoom-controls">
                <button id="zoom-out" title="缩小">−</button>
                <button id="zoom-reset" title="重置缩放">⊙</button>
                <button id="zoom-in" title="放大">+</button>
            </div>
            <div id="date-selector">
                <span>所有历史数据</span>
            </div>
        </div>

        <div id="main-content">
            <div id="indicator-list">
                <button class="indicator-btn active" data-indicator="cpu">CPU</button>
                <button class="indicator-btn" data-indicator="disk">磁盘</button>
                <button class="indicator-btn" data-indicator="ram">RAM</button>
                <button class="indicator-btn" data-indicator="temperature">温度</button>
                <button class="indicator-btn" data-indicator="upload">上传速度</button>
                <button class="indicator-btn" data-indicator="download">下载速度</button>
            </div>

            <div id="chart-container">
                <div id="chart"></div>
                <div id="loading" class="hidden">加载中...</div>
                <div id="error" class="hidden"></div>
                <div id="no-data" class="hidden">暂无数据</div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
