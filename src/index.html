<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS System Monitor</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Load LightweightCharts from CDN - using v4 -->
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        // Add global error handling
        window.addEventListener('error', (e) => {
            console.error('Global error:', e.error);
        });
        window.addEventListener('unhandledrejection', (e) => {
            console.error('Unhandled promise rejection:', e.reason);
        });
        // Check if LightweightCharts is loaded
        window.addEventListener('load', () => {
            console.log('Window loaded, LightweightCharts:', window.LightweightCharts);
        });
    </script>
</head>
<body>
    <div id="app">
        <div id="toolbar">
            <div id="period-buttons">
                <button class="period-btn" data-period="5s">5s</button>
                <button class="period-btn active" data-period="1min">1m</button>
                <button class="period-btn" data-period="5min">5m</button>
                <button class="period-btn" data-period="15min">15m</button>
                <button class="period-btn" data-period="1h">1h</button>
            </div>
            <div id="zoom-controls">
                <button id="zoom-out" title="Zoom Out">−</button>
                <button id="zoom-reset" title="Reset Zoom">⊙</button>
                <button id="zoom-in" title="Zoom In">+</button>
            </div>
        </div>

        <div id="main-content">
            <div id="indicator-list">
                <button class="indicator-btn active" data-indicator="cpu">CPU</button>
                <button class="indicator-btn" data-indicator="disk">Disk</button>
                <button class="indicator-btn" data-indicator="ram">RAM</button>
                <button class="indicator-btn" data-indicator="temperature">Temperature</button>
                <button class="indicator-btn" data-indicator="upload">Upload</button>
                <button class="indicator-btn" data-indicator="download">Download</button>
            </div>

            <div id="chart-container">
                <div id="chart"></div>
                <div id="loading" class="hidden">Loading...</div>
                <div id="error" class="hidden"></div>
                <div id="no-data" class="hidden">No data available</div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
